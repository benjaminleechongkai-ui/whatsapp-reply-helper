<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#075E54" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WhatsApp Reply Helper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
          />
        </svg>
      </div>
      <div>
        <h1 class="header__title">Reply Helper</h1>
        <p class="header__subtitle">Polish draft replies for customers</p>
      </div>
    </header>

    <main class="main">
      <form id="rewrite-form" class="form" novalidate>
        <label class="field">
          <span class="field__label">Customer message <span class="optional">(optional)</span></span>
          <textarea
            id="customer-message"
            name="customerMessage"
            class="field__input"
            rows="4"
            placeholder="Paste the customer's WhatsApp message here…"
            autocomplete="off"
          ></textarea>
        </label>

        <label class="field">
          <span class="field__label">Your draft reply</span>
          <textarea
            id="draft-reply"
            name="draftReply"
            class="field__input field__input--primary"
            rows="5"
            placeholder="Type your reply in broken English…"
            required
            autocomplete="off"
          ></textarea>
        </label>

        <fieldset class="tone">
          <legend class="tone__legend">Tone</legend>
          <div class="tone__options" role="radiogroup" aria-label="Reply tone">
            <label class="tone__option">
              <input type="radio" name="tone" value="friendly" checked />
              <span class="tone__pill">Friendly</span>
            </label>
            <label class="tone__option">
              <input type="radio" name="tone" value="professional" />
              <span class="tone__pill">Professional</span>
            </label>
            <label class="tone__option">
              <input type="radio" name="tone" value="formal" />
              <span class="tone__pill">Formal</span>
            </label>
          </div>
        </fieldset>

        <button type="submit" class="btn btn--primary" id="submit-btn">
          <span class="btn__label">Rewrite with Claude</span>
          <span class="btn__spinner" hidden aria-hidden="true"></span>
        </button>
      </form>

      <section
        id="result-section"
        class="result"
        hidden
        aria-live="polite"
      >
        <div class="result__header">
          <h2 class="result__title">Rewritten reply</h2>
          <span id="result-tone-badge" class="result__badge"></span>
        </div>
        <div id="result-text" class="result__body"></div>
        <button type="button" class="btn btn--secondary" id="copy-btn">
          <svg class="btn__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
          </svg>
          <span id="copy-btn-label">Copy to clipboard</span>
        </button>
      </section>

      <p id="error-message" class="error" role="alert" hidden></p>
    </main>

    <footer class="footer">
      <p>For staff use · Paste result back into WhatsApp</p>
    </footer>

    <script src="app.js" type="module"></script>
  </body>
</html>
